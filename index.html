<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pay Calculator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f4f4f0; color: #1a1a1a;
      min-height: 100vh; padding: 1.5rem 1rem 3rem;
    }
    .app { max-width: 480px; margin: 0 auto; }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 1.5rem; }
    .card {
      background: #fff; border-radius: 14px;
      border: 1px solid #e5e5e0; padding: 1.1rem 1.25rem; margin-bottom: 14px;
    }
    .section-label {
      font-size: 11px; font-weight: 600; letter-spacing: 0.07em;
      text-transform: uppercase; color: #999; margin-bottom: 10px;
    }
    .field { display: flex; flex-direction: column; gap: 4px; flex: 1; }
    .field label { font-size: 12px; color: #666; }
    input[type="date"], input[type="time"] {
      width: 100%; height: 40px; border: 1px solid #ddd; border-radius: 9px;
      padding: 0 10px; font-size: 15px; background: #fafafa; color: #1a1a1a; outline: none;
    }
    input[type="date"]:focus, input[type="time"]:focus { border-color: #999; background: #fff; }

    .shift-block { margin-bottom: 10px; }
    .shift-row {
      display: flex; gap: 10px; align-items: flex-end; margin-bottom: 4px;
    }
    .shift-label {
      font-size: 11px; color: #aaa; margin-bottom: 6px; font-weight: 500;
    }
    .remove-shift-btn {
      height: 40px; width: 36px; background: none;
      border: 1px solid #eee; border-radius: 9px;
      font-size: 18px; color: #ccc; cursor: pointer; flex-shrink: 0;
    }
    .remove-shift-btn:hover { color: #e53935; border-color: #e53935; }

    .add-shift-btn {
      background: none; border: 1px dashed #ccc; border-radius: 9px;
      width: 100%; padding: 8px; font-size: 13px; color: #aaa;
      cursor: pointer; margin-bottom: 10px;
    }
    .add-shift-btn:hover { border-color: #999; color: #666; }

    .arrow { color: #bbb; font-size: 18px; padding-bottom: 10px; flex-shrink: 0; }

    .save-btn {
      height: 40px; padding: 0 18px; background: #1a1a1a; color: #fff;
      border: none; border-radius: 9px; font-size: 15px; cursor: pointer;
      font-weight: 500; width: 100%; margin-top: 4px;
    }
    .save-btn:active { opacity: 0.8; }

    .duration-preview {
      font-size: 13px; color: #888; margin-bottom: 10px; min-height: 18px; text-align: center;
    }
    .duration-preview span { color: #1a1a1a; font-weight: 600; }
    .error-msg { font-size: 12px; color: #e53935; margin-top: 6px; display: none; text-align: center; }

    .month-title { font-size: 16px; font-weight: 600; margin-bottom: 2px; }
    .month-sub { font-size: 12px; color: #999; margin-bottom: 12px; }
    .empty-msg { text-align: center; color: #bbb; font-size: 14px; padding: 18px 0 6px; }

    .entry-item { border-bottom: 1px solid #f0f0ec; }
    .entry-item:last-child { border-bottom: none; }
    .entry-row {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 0; font-size: 14px; cursor: pointer; user-select: none;
    }
    .entry-date { font-size: 13px; color: #666; min-width: 82px; }
    .badge { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 5px; }
    .badge-weekday { background: #e8f0fe; color: #3367d6; }
    .badge-saturday { background: #fff3e0; color: #e65100; }
    .entry-hours { flex: 1; color: #444; font-size: 13px; }
    .entry-pay { font-weight: 600; color: #1a1a1a; min-width: 60px; text-align: right; }
    .chevron { font-size: 11px; color: #bbb; margin-left: 2px; transition: transform 0.2s; display: inline-block; }
    .chevron.open { transform: rotate(90deg); }
    .del-btn {
      background: none; border: none; font-size: 17px;
      color: #ddd; cursor: pointer; line-height: 1; padding: 0 2px;
    }
    .del-btn:hover { color: #e53935; }

    .entry-detail {
      display: none; background: #f9f9f6; border-radius: 9px;
      padding: 10px 12px; margin-bottom: 8px; font-size: 13px;
    }
    .entry-detail.open { display: block; }
    .detail-row {
      display: flex; justify-content: space-between; padding: 4px 0;
      color: #555; border-bottom: 1px solid #efefeb;
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-row.total-row { font-weight: 600; color: #1a1a1a; margin-top: 2px; }
    .detail-label { color: #888; }
    .detail-divider { border: none; border-top: 1px dashed #e0e0db; margin: 4px 0; }

    hr { border: none; border-top: 1px solid #f0f0ec; margin: 12px 0; }
    .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
    .metric { background: #f7f7f3; border-radius: 10px; padding: 12px 14px; }
    .metric-label { font-size: 12px; color: #999; margin-bottom: 4px; }
    .metric-value { font-size: 20px; font-weight: 600; color: #1a1a1a; }
    .total-block {
      background: #1a1a1a; border-radius: 10px; padding: 14px 16px;
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;
    }
    .total-label { font-size: 13px; color: #aaa; }
    .total-value { font-size: 24px; font-weight: 700; color: #fff; }
    .clear-btn {
      width: 100%; background: none; border: 1px solid #e5e5e0;
      border-radius: 9px; padding: 9px; font-size: 13px; color: #aaa; cursor: pointer;
    }
    .clear-btn:hover { color: #e53935; border-color: #e53935; }

    @media (prefers-color-scheme: dark) {
      body { background: #141414; color: #f0f0f0; }
      .card { background: #1e1e1e; border-color: #2e2e2e; }
      h1 { color: #f0f0f0; }
      input[type="date"], input[type="time"] { background: #2a2a2a; border-color: #3a3a3a; color: #f0f0f0; }
      input[type="date"]:focus, input[type="time"]:focus { background: #2e2e2e; border-color: #666; }
      .save-btn { background: #f0f0f0; color: #1a1a1a; }
      .add-shift-btn { border-color: #3a3a3a; color: #666; }
      .add-shift-btn:hover { border-color: #666; color: #aaa; }
      .remove-shift-btn { border-color: #2e2e2e; color: #555; }
      .entry-item { border-color: #2a2a2a; }
      .entry-detail { background: #252525; }
      .detail-row { border-color: #2e2e2e; color: #ccc; }
      .detail-row.total-row { color: #f0f0f0; }
      .detail-label { color: #777; }
      .metric { background: #252525; }
      .metric-value { color: #f0f0f0; }
      hr { border-color: #2a2a2a; }
      .clear-btn { border-color: #2e2e2e; }
      .entry-date { color: #aaa; }
      .entry-hours { color: #ccc; }
      .entry-pay { color: #f0f0f0; }
      .badge-weekday { background: #1a2a4a; color: #7aabff; }
      .badge-saturday { background: #2a1a00; color: #ffaa44; }
      .total-block { background: #f0f0f0; }
      .total-label { color: #888; }
      .total-value { color: #1a1a1a; }
      .duration-preview { color: #777; }
      .duration-preview span { color: #f0f0f0; }
    }
  </style>
</head>
<body>
<div class="app">
  <h1>Pay Calculator</h1>

  <div class="card">
    <div class="section-label">Add a work day</div>

    <div class="shift-row" style="margin-bottom:10px;">
      <div class="field">
        <label>Date</label>
        <input type="date" id="inp-date" onchange="updatePreview()" />
      </div>
    </div>

    <div id="shifts-container"></div>

    <button class="add-shift-btn" onclick="addShiftBlock()">+ Add another shift (e.g. came back after appointment)</button>

    <div id="break-toggle-row" style="display:none; align-items:center; gap:10px; margin-bottom:10px;">
      <input type="checkbox" id="break-included" checked onchange="updatePreview()" style="width:18px;height:18px;cursor:pointer;accent-color:#1a1a1a;" />
      <label for="break-included" style="font-size:13px;color:#666;cursor:pointer;">I took my 30 min break during these shifts (deduct it)</label>
    </div>

    <p class="duration-preview" id="duration-preview"></p>
    <button class="save-btn" onclick="addEntry()">Save day</button>
    <p class="error-msg" id="err-msg"></p>
  </div>

  <div class="card">
    <div id="month-title" class="month-title" style="display:none;"></div>
    <div id="month-sub" class="month-sub" style="display:none;"></div>
    <div id="entries-list">
      <p class="empty-msg">No entries yet — add your first day above</p>
    </div>
    <div id="summary-section" style="display:none;">
      <hr />
      <div class="summary-grid">
        <div class="metric"><div class="metric-label">Regular hours</div><div class="metric-value" id="s-reg-hrs">—</div></div>
        <div class="metric"><div class="metric-label">Overtime hours</div><div class="metric-value" id="s-ot-hrs">—</div></div>
        <div class="metric"><div class="metric-label">Regular pay</div><div class="metric-value" id="s-reg-pay">—</div></div>
        <div class="metric"><div class="metric-label">Overtime pay</div><div class="metric-value" id="s-ot-pay">—</div></div>
      </div>
      <div class="total-block">
        <span class="total-label">Total pay this month</span>
        <span class="total-value" id="s-total">€0.00</span>
      </div>
      <button class="clear-btn" onclick="clearAll()">Clear all entries</button>
    </div>
  </div>
</div>

<script>
  const WEEKDAY_RATE   = 10.00;
  const SATURDAY_RATE  = 13.00;
  const OVERTIME_RATE  = 13.00;
  const OVERTIME_LIMIT = 8.0;
  const BREAK_HOURS    = 0.5;

  let entries = [];
  try { entries = JSON.parse(localStorage.getItem('pay_entries') || '[]'); } catch(e) {}

  document.getElementById('inp-date').value = new Date().toISOString().split('T')[0];

  // Build initial single shift block
  let shiftCount = 0;
  addShiftBlock();

  function addShiftBlock() {
    shiftCount++;
    const id  = shiftCount;
    const div = document.createElement('div');
    div.className = 'shift-block';
    div.id = 'shift-block-' + id;
    div.innerHTML = `
      <div class="shift-label" id="shift-label-${id}">Shift ${id}</div>
      <div class="shift-row">
        <div class="field">
          <label>Punch in</label>
          <input type="time" id="start-${id}" onchange="updatePreview()" />
        </div>
        <div class="arrow">→</div>
        <div class="field">
          <label>Punch out</label>
          <input type="time" id="end-${id}" onchange="updatePreview()" />
        </div>
        ${id > 1 ? `<button class="remove-shift-btn" onclick="removeShiftBlock(${id})">×</button>` : ''}
      </div>`;
    document.getElementById('shifts-container').appendChild(div);
    updateShiftLabels();
    updateBreakToggleVisibility();
  }

  function removeShiftBlock(id) {
    document.getElementById('shift-block-' + id).remove();
    updateShiftLabels();
    updateBreakToggleVisibility();
    updatePreview();
  }

  function updateBreakToggleVisibility() {
    const count = document.querySelectorAll('.shift-block').length;
    document.getElementById('break-toggle-row').style.display = count > 1 ? 'flex' : 'none';
  }

  function updateShiftLabels() {
    const blocks = document.querySelectorAll('.shift-block');
    blocks.forEach((b, i) => {
      const lbl = b.querySelector('.shift-label');
      if (lbl) lbl.textContent = blocks.length > 1 ? 'Shift ' + (i + 1) : 'Shift';
    });
  }

  function getShifts() {
    const blocks = document.querySelectorAll('.shift-block');
    const shifts = [];
    blocks.forEach(b => {
      const startEl = b.querySelector('input[id^="start-"]');
      const endEl   = b.querySelector('input[id^="end-"]');
      if (startEl && endEl && startEl.value && endEl.value) {
        shifts.push({ start: startEl.value, end: endEl.value });
      }
    });
    return shifts;
  }

  function timeToDecimal(t) { const [h,m] = t.split(':').map(Number); return h + m/60; }
  function diffHours(s, e) { let sd = timeToDecimal(s), ed = timeToDecimal(e); if (ed<=sd) ed+=24; return ed-sd; }
  function toHHMM(dec) {
    if (dec <= 0) return '0h';
    const h = Math.floor(dec);
    const m = Math.round((dec - h) * 60);
    return m > 0 ? h + 'h ' + m + 'm' : h + 'h';
  }
  function dayType(dateStr) { return new Date(dateStr + 'T12:00:00').getDay() === 6 ? 'Saturday' : 'Weekday'; }
  function fmt(n) { return '€' + n.toFixed(2); }
  function formatDate(dateStr) {
    return new Date(dateStr + 'T12:00:00').toLocaleDateString('en-GB', { weekday: 'short', day: '2-digit', month: 'short' });
  }

  function calcDay(grossHours, type, skipBreak) {
    const breakDeducted = (type === 'Saturday' || skipBreak) ? 0 : BREAK_HOURS;
    const net = Math.max(grossHours - breakDeducted, 0);
    if (type === 'Saturday') {
      return { gross: grossHours, breakDeducted, net, regHrs: net, otHrs: 0,
               regPay: net * SATURDAY_RATE, otPay: 0, total: net * SATURDAY_RATE, rate: SATURDAY_RATE };
    }
    const regHrs = Math.min(net, OVERTIME_LIMIT);
    const otHrs  = Math.max(net - OVERTIME_LIMIT, 0);
    return {
      gross: grossHours, breakDeducted, net, regHrs, otHrs, rate: WEEKDAY_RATE,
      regPay: regHrs * WEEKDAY_RATE, otPay: otHrs * OVERTIME_RATE,
      total:  regHrs * WEEKDAY_RATE + otHrs * OVERTIME_RATE
    };
  }

  function updatePreview() {
    const date   = document.getElementById('inp-date').value;
    const shifts = getShifts();
    const prev   = document.getElementById('duration-preview');
    if (shifts.length === 0) { prev.innerHTML = ''; return; }
    const gross  = shifts.reduce((sum, s) => sum + diffHours(s.start, s.end), 0);
    const type   = date ? dayType(date) : 'Weekday';
    const multi  = shifts.length > 1;
    const breakChecked = multi ? document.getElementById('break-included').checked : true;
    const c      = calcDay(gross, type, !breakChecked);
    const breakNote = type === 'Saturday' ? 'no break on Saturday' : breakChecked ? '30 min break deducted' : 'no break deducted';
    const shiftsStr = shifts.map(s => s.start + ' – ' + s.end).join(' + ');
    prev.innerHTML = `${shiftsStr} = <span>${toHHMM(gross)}</span> on shift · <span>${toHHMM(c.net)}</span> counted (${breakNote})`;
  }

  function toggleDetail(i) {
    const detail  = document.getElementById('detail-' + i);
    const chevron = document.getElementById('chev-' + i);
    const isOpen  = detail.classList.contains('open');
    detail.classList.toggle('open', !isOpen);
    chevron.classList.toggle('open', !isOpen);
  }

  function render() {
    const list    = document.getElementById('entries-list');
    const summary = document.getElementById('summary-section');
    const mtitle  = document.getElementById('month-title');
    const msub    = document.getElementById('month-sub');

    if (entries.length === 0) {
      list.innerHTML = '<p class="empty-msg">No entries yet — add your first day above</p>';
      summary.style.display = 'none'; mtitle.style.display = 'none'; msub.style.display = 'none';
      return;
    }

    const sorted = [...entries].sort((a,b) => b.date.localeCompare(a.date));
    const wdays  = sorted.filter(e => dayType(e.date) === 'Weekday').length;
    const sdays  = sorted.filter(e => dayType(e.date) === 'Saturday').length;

    mtitle.style.display = 'block'; msub.style.display = 'block';
    mtitle.textContent = new Date(sorted[sorted.length-1].date + 'T12:00:00')
      .toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });
    msub.textContent = `${sorted.length} day${sorted.length>1?'s':''} logged  ·  ${wdays} weekday${wdays!==1?'s':''}  ·  ${sdays} Saturday${sdays!==1?'s':''}`;

    list.innerHTML = sorted.map((e, i) => {
      const type  = dayType(e.date);
      const isSat = type === 'Saturday';
      const multi = e.shifts.length > 1;
      const c     = calcDay(e.gross, type, e.skipBreak || false);
      const idx   = entries.findIndex(x => x.date === e.date);
      const shiftsStr = e.shifts.map(s => s.start + ' – ' + s.end).join(', ');

      const shiftLines = e.shifts.map((s, si) =>
        `<div class="detail-row"><span class="detail-label">Shift ${e.shifts.length > 1 ? si+1 : ''}</span><span>${s.start} → ${s.end} (${toHHMM(diffHours(s.start, s.end))})</span></div>`
      ).join('');

      const breakLine = isSat
        ? `<div class="detail-row"><span class="detail-label">Break deducted</span><span>None (Saturday)</span></div>`
        : e.skipBreak
        ? `<div class="detail-row"><span class="detail-label">Break deducted</span><span>None</span></div>`
        : `<div class="detail-row"><span class="detail-label">Break deducted</span><span>− 30 min</span></div>`;

      const otLine = c.otHrs > 0
        ? `<div class="detail-row"><span class="detail-label">Overtime (${toHHMM(c.otHrs)} × €${OVERTIME_RATE.toFixed(2)})</span><span>${fmt(c.otPay)}</span></div>`
        : `<div class="detail-row"><span class="detail-label">Overtime</span><span>None</span></div>`;

      return `<div class="entry-item">
        <div class="entry-row" onclick="toggleDetail(${i})">
          <span class="entry-date">${formatDate(e.date)}</span>
          <span class="badge ${isSat?'badge-saturday':'badge-weekday'}">${type}</span>
          <span class="entry-hours">${shiftsStr} · ${toHHMM(c.net)}</span>
          <span class="entry-pay">${fmt(c.total)}</span>
          <span class="chevron" id="chev-${i}">›</span>
          <button class="del-btn" onclick="event.stopPropagation();removeEntry(${idx})">×</button>
        </div>
        <div class="entry-detail" id="detail-${i}">
          ${shiftLines}
          <div class="detail-row"><span class="detail-label">Total on shift</span><span>${toHHMM(c.gross)}</span></div>
          ${breakLine}
          <div class="detail-row"><span class="detail-label">Hours counted</span><span>${toHHMM(c.net)}</span></div>
          <hr class="detail-divider" />
          <div class="detail-row"><span class="detail-label">Regular (${toHHMM(c.regHrs)} × €${c.rate.toFixed(2)})</span><span>${fmt(c.regPay)}</span></div>
          ${otLine}
          <div class="detail-row total-row"><span>Day total</span><span>${fmt(c.total)}</span></div>
        </div>
      </div>`;
    }).join('');

    let totReg=0, totOT=0, totRegPay=0, totOTPay=0, totTotal=0;
    entries.forEach(e => {
      const c = calcDay(e.gross, dayType(e.date), e.skipBreak || false);
      totReg+=c.regHrs; totOT+=c.otHrs; totRegPay+=c.regPay; totOTPay+=c.otPay; totTotal+=c.total;
    });
    document.getElementById('s-reg-hrs').textContent = toHHMM(totReg);
    document.getElementById('s-ot-hrs').textContent  = toHHMM(totOT);
    document.getElementById('s-reg-pay').textContent = fmt(totRegPay);
    document.getElementById('s-ot-pay').textContent  = fmt(totOTPay);
    document.getElementById('s-total').textContent   = fmt(totTotal);
    summary.style.display = 'block';
  }

  function showError(msg) {
    const el = document.getElementById('err-msg');
    el.textContent = msg; el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 3000);
  }

  function addEntry() {
    const date   = document.getElementById('inp-date').value;
    const blocks = document.querySelectorAll('.shift-block');

    if (!date) { showError('Please pick a date.'); return; }
    if (new Date(date + 'T12:00:00').getDay() === 0) { showError('Sundays are not counted as work days.'); return; }
    if (entries.find(e => e.date === date)) { showError('This date is already saved. Remove it first to update.'); return; }

    const shifts = [];
    let valid = true;
    blocks.forEach((b, i) => {
      const startEl = b.querySelector('input[id^="start-"]');
      const endEl   = b.querySelector('input[id^="end-"]');
      if (!startEl.value || !endEl.value) { showError('Please fill in all punch in and punch out times.'); valid = false; return; }
      const hrs = diffHours(startEl.value, endEl.value);
      if (hrs <= 0) { showError('Punch out must be after punch in for each shift.'); valid = false; return; }
      shifts.push({ start: startEl.value, end: endEl.value });
    });
    if (!valid) return;

    const gross = shifts.reduce((sum, s) => sum + diffHours(s.start, s.end), 0);
    const multi = shifts.length > 1;
    const skipBreak = multi ? !document.getElementById('break-included').checked : false;
    entries.push({ date, shifts, gross, skipBreak });
    save();

    // Reset form
    document.getElementById('shifts-container').innerHTML = '';
    document.getElementById('break-toggle-row').style.display = 'none';
    document.getElementById('break-included').checked = true;
    shiftCount = 0;
    addShiftBlock();
    document.getElementById('duration-preview').innerHTML = '';

    const next = new Date(date + 'T12:00:00');
    next.setDate(next.getDate() + 1);
    if (next.getDay() === 0) next.setDate(next.getDate() + 1);
    document.getElementById('inp-date').value = next.toISOString().split('T')[0];
    render();
  }

  function save() { try { localStorage.setItem('pay_entries', JSON.stringify(entries)); } catch(e) {} }
  function removeEntry(idx) { entries.splice(idx, 1); save(); render(); }
  function clearAll() { if (confirm('Clear all entries?')) { entries = []; save(); render(); } }

  render();
</script>
</body>
</html>
